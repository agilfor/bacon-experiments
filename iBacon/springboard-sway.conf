# Strip away all window borders and titles
default_border none

# Force apps to open Fullscreen (iOS style)
for_window [app_id=".*"] fullscreen enable
for_window [class=".*"] fullscreen enable

# The iOS Home Swipe: 1 finger, swipe Up, from the Bottom edge, run the kill command
exec lisgd -g "1,U,B,*,swaymsg kill"

# Launch your custom OS
exec ~/bacon-experiments/springboard