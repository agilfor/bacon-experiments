# Strip away all window borders and titles
default_border none

# Force apps to open Fullscreen (iOS style)
for_window [app_id=".*"] fullscreen enable
for_window [class=".*"] fullscreen enable

# --- ONEPLUS ONE HARDWARE FIXES ---
# Disable hardware-accelerated cursor logic
seat seat0 xcursor_theme default 24

# Force the display timing (Flat syntax, correct commands)
output * modeline 173.00 1080 1144 1256 1440 1920 1928 1932 2000 -hsync +vsync
output * mode 1080x1920
output * bg #000000 solid_color

# The iOS Home Swipe pointing directly to the real hardware path
exec lisgd -d /dev/input/event3 -g "2,U,*,*,swaymsg kill"

# Launch your custom OS with a short delay so the GPU driver can settle
exec sleep 2 && ~/bacon-experiments/iBacon/springboard