default_border none
assign [app_id="springboard"] workspace 1

# --- ONEPLUS ONE HARDWARE FIXES ---
# Disable hardware-accelerated cursor logic
seat seat0 xcursor_theme default 24

# Force the display timing (Flat syntax, correct commands)
output * modeline 173.00 1080 1144 1256 1440 1920 1928 1932 2000 -hsync +vsync
output * mode 1080x1920
output * bg #000000 solid_color

# The Home Swipe pointing directly to the real hardware path
exec lisgd -d /dev/input/event3 \
 -g "1,U,*,*,~/bacon-experiments/iBacon/swipe.sh" \
 -g "2,D,*,*,pkill -USR2 wvkbd"

# Launch your custom OS with a short delay so the GPU driver can settle
exec waybar -c ~/bacon-experiments/iBacon/waybar.json -s ~/bacon-experiments/iBacon/waybar.css
exec sleep 1 && ~/bacon-experiments/iBacon/springboard
exec wvkbd-mobintl --hidden